services:
  nginx:
    image: nginx:alpine
    container_name: feriaapp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - public-web
    networks:
      - feriaapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feriaapp-backend
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/feriaApp
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
    depends_on:
      - mongo
    networks:
      - feriaapp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feriaapp-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - feriaapp-network

  public-web:
    build:
      context: ./public-web
      dockerfile: Dockerfile
    container_name: feriaapp-public
    expose:
      - "80"
    networks:
      - feriaapp-network

  mongo:
    image: mongo:7
    container_name: feriaapp-mongo
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - feriaapp-network

volumes:
  mongo-data:

networks:
  feriaapp-network:
    driver: bridge